    regexp: '^(GRUB_CMDLINE_LINUX=".*)"$'
    replace: '\1 vsyscall=none"'
  when:
    - rhel9STIG_stigrule_257792_Manage
    - grub_vsyscall_check.rc != 0
  notify: Update grub.cfg

