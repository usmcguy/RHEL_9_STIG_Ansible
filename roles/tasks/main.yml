- name: Check for EFI directory
  ansible.builtin.stat:
    path: /sys/firmware/efi
    get_checksum: false
    get_mime: false
  register: efi_dir

- name: Set boot_mode fact
  ansible.builtin.set_fact:
    boot_mode: "{{ 'UEFI' if efi_dir.stat.exists else 'BIOS' }}"

# V-257778 SV-257778r1134892 RHEL-09-211015 SRG-OS-000480-GPOS-00227
# https://access.redhat.com/security/team/key
# key in repo is from official ISO
- name: Copy RPM signing key
  ansible.builtin.copy:
    src: files/RPM-GPG-KEY-redhat-release
    dest: /etc/pki/rpm-gpg/RPM-GPG-KEY-redhat-release
    owner: root
    group: root
    mode: '0644'

- name: stigrule_257778__dnf_repoinfo
  ansible.builtin.command:
    cmd: dnf repoinfo
  register: dnf_repoinfo
  changed_when: false
  when: rhel9STIG_stigrule_257778_Manage

- name: stigrule_257778__add_repository_rhel9_baseos
  ansible.builtin.yum_repository:
    name: rhel-9-for-x86_64-baseos-rpms
    description: Red Hat Enterprise Linux 9 for x86_64 - BaseOS (RPMs)
    file: "{{ rhel9STIG_stigrule_257778_repo_file }}"
    baseurl: "{{ rhel9STIG_stigrule_257778__baseos_Baseurl }}"
    gpgcheck: true
    gpgkey: file:///etc/pki/rpm-gpg/RPM-GPG-KEY-redhat-release
    enabled: true
    mode: '0644'
  when:
    - rhel9STIG_stigrule_257778_Manage
    - rhel9STIG_stigrule_257778__baseos_Baseurl is defined
    - rhel9STIG_stigrule_257778__baseos_Baseurl not in dnf_repoinfo.stdout

- name: stigrule_257778__add_repository_rhel9_appstream
  ansible.builtin.yum_repository:
    name: rhel-9-for-x86_64-appstream-rpms
    description: Red Hat Enterprise Linux 9 for x86_64 - AppStream (RPMs)
    file: "{{ rhel9STIG_stigrule_257778_repo_file }}"
    baseurl: "{{ rhel9STIG_stigrule_257778__appstream_Baseurl }}"
    gpgcheck: true
    gpgkey: file:///etc/pki/rpm-gpg/RPM-GPG-KEY-redhat-release
    enabled: true
    mode: '0644'
  when:
    - rhel9STIG_stigrule_257778_Manage
    - rhel9STIG_stigrule_257778__appstream_Baseurl is defined
    - rhel9STIG_stigrule_257778__appstream_Baseurl not in dnf_repoinfo.stdout

- name: stigrule_257778__dnf_update
  ansible.builtin.dnf:
    name: '*'
    state: "{{ rhel9STIG_stigrule_257778__dnf_State }}"
    update_cache: true
    skip_broken: true
    lock_timeout: 60
    update_only: true
  when: rhel9STIG_stigrule_257778_Manage

