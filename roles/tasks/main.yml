# V-257789 SV-257789r1137691 RHEL-09-212020 SRG-OS-000080-GPOS-00048
- name: Ensure grub2-tools present
  ansible.builtin.package:
    name: grub2-tools
    state: present
  when: rhel9STIG_stigrule_257789_Manage

- name: Get current superuser value
  ansible.builtin.shell: |
    set -o pipefail
    grep 'set superusers=' /etc/grub.d/01_users | awk -F'"' '{print $2}' || true
  register: current_superuser
  changed_when: false
  when: rhel9STIG_stigrule_257789_Manage

- name: Get current password_pbkdf2 value
  ansible.builtin.shell: |
    set -o pipefail
    grep 'password_pbkdf2' /etc/grub.d/01_users | awk -F' ' '{print $2}' || true
  register: password_pbkdf2_user
  changed_when: false
  when: rhel9STIG_stigrule_257789_Manage

- name: Chown /etc/grub.d/01_users
  ansible.builtin.file:
    path: /etc/grub.d/01_users
    owner: root
    group: root
    mode: '0755'
  when: rhel9STIG_stigrule_257789_Manage

- name: stigrule_257789__change_superuser_unique
  ansible.builtin.lineinfile:
    path: /etc/grub.d/01_users
    regexp: '^(.*set superusers=)"[^"]*"'
    line: '\1"{{ rhel9STIG_stigrule_257789_unique_name }}"'
    backrefs: true
  when:
    - rhel9STIG_stigrule_257789_Manage
    - current_superuser.stdout_lines | intersect(interactive_user_list | map(attribute='key') | list) | length > 0
  register: superuser_updated
  notify: Update grub.cfg

- name: stigrule_257789__change_pbkdf2_to_unique
  ansible.builtin.lineinfile:
    path: /etc/grub.d/01_users
    regexp: '^(.*password_pbkdf2 )\S+(\s+\S+)?$'
    line: '\1"{{ rhel9STIG_stigrule_257789_unique_name }}"\2'
    backrefs: true
  when:
    - rhel9STIG_stigrule_257789_Manage
    - password_pbkdf2_user.stdout_lines | intersect(interactive_user_list | map(attribute='key') | list) | length > 0
  notify: Update grub.cfg

